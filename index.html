  <style>
    :root {
      --bg:        #0D0D0F;
      --bg2:       #111318;
      --blue:      #004AAD;
      --blue-lt:   #1A6FE0;
      --blue-glow: rgba(0,74,173,0.35);
      --gold:      #D4A827;
      --gold-lt:   #F0C847;
      --white:     #F8F9FA;
      --gray:      #9CA3AF;
      --gray-dk:   #4B5563;
      --font-d:    'Bebas Neue', sans-serif;
      --font-u:    'Space Grotesk', 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-u);
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100%;
      background: var(--bg);
      overflow-y: auto;
    }

    /* ── GRID TEXTURE ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,74,173,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,74,173,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── GLOW ── */
    body::after {
      content: '';
      position: fixed;
      top: -20%; left: 50%; transform: translateX(-50%);
      width: 80vw; height: 60vh;
      background: radial-gradient(ellipse at center, rgba(0,74,173,0.18) 0%, transparent 70%);
      z-index: 0; pointer-events: none;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid rgba(0,74,173,0.2);
      backdrop-filter: blur(12px);
      background: rgba(13,13,15,0.8);
      animation: fadeDown 0.8s ease both;
    }
    .logo {
      font-family: var(--font-d);
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      letter-spacing: 0.12em;
      color: var(--white);
    }
    .logo span { color: var(--blue-lt); }
    .nav-links {
      display: flex; gap: 1.5rem; align-items: center;
    }
    .nav-links a {
      color: var(--gray); font-size: 0.82rem; font-weight: 500;
      text-decoration: none; letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-links a.active { color: var(--blue-lt); }

    /* ── MAIN CONTENT ── */
    .content {
      position: relative; z-index: 1;
      padding-top: 5rem;
    }

    /* ── HERO SECTION ── */
    .hero-section {
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: 4rem 1.5rem 3rem;
      max-width: 820px; margin: 0 auto;
    }

    .eyebrow {
      font-size: clamp(0.65rem, 1.5vw, 0.78rem);
      font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--blue-lt);
      margin-bottom: 1rem;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    h1 {
      font-family: var(--font-d);
      font-size: clamp(3rem, 9vw, 6rem);
      line-height: 0.95;
      letter-spacing: 0.03em;
      color: var(--white);
      margin-bottom: 1.25rem;
      animation: fadeUp 0.8s 0.2s ease both;
    }
    h1 .accent { color: var(--blue-lt); }

    .sub {
      font-size: clamp(0.9rem, 2.2vw, 1.1rem);
      font-weight: 400; line-height: 1.6;
      color: var(--gray);
      max-width: 560px;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.8s 0.35s ease both;
    }

    /* ── FEATURED PRODUCT: PPC COACH ── */
    .featured {
      max-width: 860px; margin: 0 auto;
      padding: 0 1.5rem 3.5rem;
      animation: fadeUp 0.8s 0.45s ease both;
    }
    .featured-card {
      position: relative;
      background: linear-gradient(135deg, rgba(212,168,39,0.06) 0%, rgba(0,74,173,0.08) 100%);
      border: 1px solid rgba(212,168,39,0.3);
      border-radius: 16px;
      padding: 2.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      align-items: center;
    }
    .featured-badge {
      position: absolute; top: -0.7rem; left: 2rem;
      background: var(--gold);
      color: #0D0D0F;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.3rem 0.8rem; border-radius: 100px;
    }
    .featured-content h2 {
      font-family: var(--font-d);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      letter-spacing: 0.04em;
      line-height: 1.05;
      margin-bottom: 0.75rem;
    }
    .featured-content h2 .gold { color: var(--gold-lt); }
    .featured-content .tagline {
      font-size: 0.95rem; color: var(--gray);
      line-height: 1.6; margin-bottom: 1.25rem;
    }
    .featured-content .tagline strong {
      color: var(--white); font-weight: 600;
    }
    .feature-list {
      list-style: none; display: flex; flex-direction: column; gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .feature-list li {
      font-size: 0.85rem; color: var(--gray);
      padding-left: 1.5rem; position: relative;
    }
    .feature-list li::before {
      content: '✓'; position: absolute; left: 0;
      color: var(--gold); font-weight: 700;
    }
    .btn-gold {
      display: inline-block;
      background: var(--gold);
      color: #0D0D0F;
      font-family: var(--font-u); font-weight: 700; font-size: 0.9rem;
      letter-spacing: 0.04em;
      padding: 0.75rem 1.75rem;
      border: none; border-radius: 8px; cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-gold:hover {
      background: var(--gold-lt);
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(212,168,39,0.35);
    }

    /* PPC VISUAL */
    .featured-visual {
      display: flex; flex-direction: column;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(0,74,173,0.2);
      border-radius: 12px;
      padding: 1.5rem;
      gap: 0.75rem;
    }
    .ppc-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.25rem;
    }
    .ppc-header span {
      font-size: 0.7rem; color: var(--gray-dk);
      letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600;
    }
    .ppc-header .ppc-value {
      font-family: var(--font-d);
      font-size: 2rem; color: var(--gold-lt);
      letter-spacing: 0.05em;
    }
    .ppc-bars {
      display: flex; gap: 4px; align-items: flex-end; height: 80px;
    }
    .ppc-bar {
      flex: 1;
      border-radius: 3px 3px 0 0;
      transition: height 0.6s ease;
    }
    .ppc-coaching {
      background: rgba(0,74,173,0.15);
      border: 1px solid rgba(0,74,173,0.25);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    .ppc-coaching .coaching-label {
      font-size: 0.6rem; color: var(--blue-lt);
      letter-spacing: 0.1em; text-transform: uppercase;
      font-weight: 600; margin-bottom: 0.35rem;
    }
    .ppc-coaching p {
      font-size: 0.78rem; color: var(--gray);
      line-height: 1.5; font-style: italic;
    }

    /* ── PRODUCT GRID ── */
    .products-section {
      max-width: 860px; margin: 0 auto;
      padding: 0 1.5rem 3.5rem;
      animation: fadeUp 0.8s 0.55s ease both;
    }
    .section-label {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--blue-lt);
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }
    .product-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,74,173,0.2);
      border-radius: 12px;
      padding: 1.75rem;
      display: flex; flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
    }
    .product-card:hover {
      border-color: rgba(0,74,173,0.4);
      transform: translateY(-2px);
    }
    .product-card.coming-soon {
      opacity: 0.65;
    }
    .product-card.coming-soon:hover {
      opacity: 0.8;
    }
    .card-status {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.25rem 0.6rem; border-radius: 100px;
      display: inline-block; width: fit-content;
      margin-bottom: 0.75rem;
    }
    .status-live {
      color: #0D0D0F; background: var(--gold);
    }
    .status-free {
      color: #0D0D0F;
      background: var(--blue-lt);
    }
    .status-beta {
      color: var(--blue-lt);
      background: rgba(0,74,173,0.15);
      border: 1px solid rgba(0,74,173,0.3);
    }
    .product-card h3 {
      font-family: var(--font-d);
      font-size: 1.4rem; letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }
    .product-card .card-desc {
      font-size: 0.82rem; color: var(--gray);
      line-height: 1.55; flex: 1;
      margin-bottom: 1rem;
    }
    .btn-outline {
      display: inline-block;
      font-family: var(--font-u); font-weight: 600; font-size: 0.8rem;
      letter-spacing: 0.04em;
      padding: 0.55rem 1.25rem;
      border-radius: 8px; cursor: pointer;
      text-decoration: none; text-align: center;
      transition: all 0.2s;
    }
    .btn-outline-gold {
      color: var(--gold); border: 1px solid rgba(212,168,39,0.4);
      background: rgba(212,168,39,0.06);
    }
    .btn-outline-gold:hover {
      background: rgba(212,168,39,0.12);
      border-color: var(--gold);
    }
    .btn-outline-blue {
      color: var(--blue-lt); border: 1px
